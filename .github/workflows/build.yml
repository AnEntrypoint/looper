name: Build rPi Bare Metal Looper

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install toolchain
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/13.3.rel1/binrel/arm-gnu-toolchain-13.3.rel1-x86_64-aarch64-none-elf.tar.xz
          tar xf arm-gnu-toolchain-13.3.rel1-x86_64-aarch64-none-elf.tar.xz
          echo "$(readlink -f ./arm-gnu-toolchain-*/bin)" >> $GITHUB_PATH
          sudo apt-get install -y make

      - name: Clone circle
        run: git clone --depth=1 https://github.com/phorton1/circle circle

      - name: Clone circle-prh into circle/_prh
        run: git clone --depth=1 https://github.com/phorton1/circle-prh circle/_prh

      - name: Checkout looper into circle/_prh/_apps/Looper
        uses: actions/checkout@v4
        with:
          path: circle/_prh/_apps/Looper

      - name: Apply patches
        run: |
          ln -sf bcm_pcm.h circle/_prh/audio/BCM_PCM.h
          cp circle/_prh/_apps/Looper/patches/miniuart.cpp circle/_prh/utils/miniuart.cpp

      - name: Build circle libraries
        working-directory: circle
        run: |
          make -C lib RASPPI=4 AARCH=64
          make -C lib/fs RASPPI=4 AARCH=64
          make -C lib/input RASPPI=4 AARCH=64
          make -C lib/net RASPPI=4 AARCH=64
          make -C lib/sched RASPPI=4 AARCH=64
          make -C lib/usb RASPPI=4 AARCH=64
          make -C addon/fatfs RASPPI=4 AARCH=64
          make -C addon/SDCard RASPPI=4 AARCH=64

      - name: Build circle-prh libraries
        working-directory: circle/_prh
        run: |
          make -C audio RASPPI=4 AARCH=64
          make -C devices RASPPI=4 AARCH=64
          make -C utils RASPPI=4 AARCH=64
          make -C system RASPPI=4 AARCH=64
          make -C ws RASPPI=4 AARCH=64

      - name: Build Looper
        working-directory: circle/_prh/_apps/Looper
        run: make RASPPI=4 AARCH=64

      - name: Collect boot files
        run: |
          mkdir -p dist
          cp circle/_prh/_apps/Looper/kernel8-rpi4.img dist/
          cp -r circle/_prh/boot/to_sd_card/. dist/
          echo "usbspeed=full" > dist/cmdline.txt
          cd dist && zip -r ../looper-sd.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: looper-sd
          path: looper-sd.zip

      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest looper-sd.zip \
            --title "Latest Build" \
            --notes "Automated build from commit ${{ github.sha }}" \
            --repo ${{ github.repository }}
